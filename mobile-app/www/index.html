<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#219465">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>EcoSynTech - Smart Farming</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --primary: #219465;
      --primary-dark: #1a7a4a;
      --secondary: #4CAF50;
      --accent: #8BC34A;
      --danger: #f44336;
      --warning: #ff9800;
      --info: #2196F3;
      --light: #f5f5f5;
      --dark: #212121;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--light); }
    .app-container { max-width: 480px; margin: 0 auto; background: white; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
    .header { background: var(--primary); color: white; padding: 16px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .status-indicator { width: 10px; height: 10px; border-radius: 50%; background: var(--secondary); }
    .status-indicator.offline { background: var(--danger); }
    .content { padding: 16px; }
    .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card-title { font-size: 14px; color: #666; margin-bottom: 8px; }
    .card-value { font-size: 24px; font-weight: 600; color: var(--dark); }
    .card-unit { font-size: 14px; color: #999; font-weight: normal; }
    .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .metric { text-align: center; padding: 12px; background: var(--light); border-radius: 8px; }
    .metric-value { font-size: 20px; font-weight: 600; color: var(--primary); }
    .metric-label { font-size: 12px; color: #666; }
    .device-list { list-style: none; }
    .device-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
    .device-name { font-weight: 500; }
    .device-status { font-size: 12px; padding: 4px 8px; border-radius: 4px; }
    .device-status.online { background: #e8f5e9; color: var(--secondary); }
    .device-status.offline { background: #ffebee; color: var(--danger); }
    .btn { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 500; width: 100%; }
    .btn:active { background: var(--primary-dark); }
    .nav { display: flex; background: white; border-top: 1px solid #eee; position: fixed; bottom: 0; width: 100%; max-width: 480px; }
    .nav-item { flex: 1; text-align: center; padding: 12px; color: #999; font-size: 12px; }
    .nav-item.active { color: var(--primary); }
    .content { padding: 16px 16px 80px; }
    .empty-state { text-align: center; padding: 40px; color: #999; }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="header">
      <h1>🌾 EcoSynTech</h1>
      <div class="status-indicator" id="connectionStatus"></div>
    </div>
    
    <div class="content">
      <div class="card">
        <div class="card-title">Nhiệt độ</div>
        <div class="card-value" id="tempValue">--<span class="card-unit">°C</span></div>
      </div>
      
      <div class="card">
        <div class="card-title">Độ ẩm đất</div>
        <div class="card-value" id="humidityValue">--<span class="card-unit">%</span></div>
      </div>
      
      <div class="metric-grid">
        <div class="metric">
          <div class="metric-value" id="deviceCount">0</div>
          <div class="metric-label">Thiết bị</div>
        </div>
        <div class="metric">
          <div class="metric-value" id="alertCount">0</div>
          <div class="metric-label">Cảnh báo</div>
        </div>
      </div>
      
      <div class="card" style="margin-top: 16px;">
        <div class="card-title">Thiết bị</div>
        <ul class="device-list" id="deviceList">
          <li class="empty-state">Đang tải...</li>
        </ul>
      </div>
      
      <div class="card">
        <div class="card-title">Điều khiển</div>
        <button class="btn" id="refreshBtn">Làm mới dữ liệu</button>
      </div>
    </div>
    
    <nav class="nav">
      <div class="nav-item active">📊 Dashboard</div>
      <div class="nav-item">🌱 Crops</div>
      <div class="nav-item">⚙️ Settings</div>
    </nav>
  </div>

  <script>
    const API_BASE = window.location.origin || 'http://localhost:3000';
    const WS_URL = (window.location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + window.location.host + '/ws';
    
    let ws = null;
    let reconnectTimer = null;
    
    function connect() {
      try {
        ws = new WebSocket(WS_URL);
        ws.onopen = () => {
          console.log('WS Connected');
          document.getElementById('connectionStatus').classList.remove('offline');
        };
        ws.onclose = () => {
          console.log('WS Disconnected');
          document.getElementById('connectionStatus').classList.add('offline');
          reconnectTimer = setTimeout(connect, 3000);
        };
        ws.onmessage = (e) => {
          const data = JSON.parse(e.data);
          updateDashboard(data);
        };
      } catch (err) {
        console.error('WS Error:', err);
      }
    }
    
    function updateDashboard(data) {
      if (data.temperature !== undefined) {
        document.getElementById('tempValue').innerHTML = data.temperature + '<span class="card-unit">°C</span>';
      }
      if (data.humidity !== undefined) {
        document.getElementById('humidityValue').innerHTML = data.humidity + '<span class="card-unit">%</span>';
      }
      if (data.devices) {
        document.getElementById('deviceCount').textContent = data.devices.length;
        const list = document.getElementById('deviceList');
        list.innerHTML = data.devices.map(d => 
          '<li class="device-item"><span class="device-name">' + d.name + '</span><span class="device-status ' + d.status + '">' + d.status + '</span></li>'
        ).join('') || '<li class="empty-state">Không có thiết bị</li>';
      }
    }
    
    async function fetchData() {
      try {
        const res = await fetch(API_BASE + '/api/sensors/latest');
        const data = await res.json();
        updateDashboard(data);
      } catch (err) {
        console.error('Fetch Error:', err);
      }
    }
    
    document.getElementById('refreshBtn').addEventListener('click', fetchData);
    
    connect();
    fetchData();
    
    setInterval(fetchData, 30000);
  </script>
</body>
</html>
