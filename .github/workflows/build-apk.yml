name: Build Mobile APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile-app/**'
      - 'capacitor.config.json'
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $HOME/android-sdk/cmdline-tools
          mkdir -p $HOME/android-sdk/cmdline-tools/latest
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools/* $HOME/android-sdk/cmdline-tools/latest/ 2>/dev/null || true
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd mobile-app
          npm install

      - name: Sync Capacitor
        run: |
          cd mobile-app
          npm install
          npx cap sync android

      - name: Check Android project
        run: |
          ls -la mobile-app/android/

      - name: Build debug APK
        run: |
          cd mobile-app/android
          touch settings.gradle
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          ./gradlew tasks --all 2>/dev/null || true
          ./gradlew app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ecosyntech-debug.apk
          path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk