<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#219465">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>EcoSynTech - Smart Farming</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --primary: #219465;
      --primary-dark: #1a7a4a;
      --secondary: #4CAF50;
      --accent: #8BC34A;
      --danger: #f44336;
      --warning: #ff9800;
      --info: #2196F3;
      --light: #f5f5f5;
      --dark: #212121;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--light); }
    .app-container { max-width: 480px; margin: 0 auto; background: white; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
    .header { background: var(--primary); color: white; padding: 16px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .status-indicator { width: 10px; height: 10px; border-radius: 50%; background: var(--secondary); }
    .status-indicator.offline { background: var(--danger); }
    .content { padding: 16px 16px 80px; }
    .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card-title { font-size: 14px; color: #666; margin-bottom: 8px; }
    .card-value { font-size: 24px; font-weight: 600; color: var(--dark); }
    .card-unit { font-size: 14px; color: #999; font-weight: normal; }
    .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .metric { text-align: center; padding: 12px; background: var(--light); border-radius: 8px; }
    .metric-value { font-size: 20px; font-weight: 600; color: var(--primary); }
    .metric-label { font-size: 12px; color: #666; }
    .device-list { list-style: none; }
    .device-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
    .device-name { font-weight: 500; }
    .device-status { font-size: 12px; padding: 4px 8px; border-radius: 4px; }
    .device-status.online { background: #e8f5e9; color: var(--secondary); }
    .device-status.offline { background: #ffebee; color: var(--danger); }
    .btn { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 500; width: 100%; }
    .btn:active { background: var(--primary-dark); }
    .nav { display: flex; background: white; border-top: 1px solid #eee; position: fixed; bottom: 0; width: 100%; max-width: 480px; }
    .nav-item { flex: 1; text-align: center; padding: 12px; color: #999; font-size: 12px; cursor: pointer; }
    .nav-item.active { color: var(--primary); }
    .empty-state { text-align: center; padding: 40px; color: #999; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .crop-card { border: 1px solid #eee; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    .crop-name { font-weight: 600; font-size: 16px; }
    .crop-info { font-size: 12px; color: #666; margin-top: 4px; }
    .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
    .setting-label { font-size: 14px; }
    .setting-value { font-size: 14px; color: #666; }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="header">
      <h1>EcoSynTech</h1>
      <div class="status-indicator" id="connectionStatus"></div>
    </div>
    
    <div id="tab-dashboard" class="tab-content active">
      <div class="content">
        <div class="card">
          <div class="card-title">Nhiệt độ</div>
          <div class="card-value" id="tempValue">--<span class="card-unit">°C</span></div>
        </div>
        
        <div class="card">
          <div class="card-title">Độ ẩm đất</div>
          <div class="card-value" id="humidityValue">--<span class="card-unit">%</span></div>
        </div>
        
        <div class="metric-grid">
          <div class="metric">
            <div class="metric-value" id="deviceCount">0</div>
            <div class="metric-label">Thiết bị</div>
          </div>
          <div class="metric">
            <div class="metric-value" id="alertCount">0</div>
            <div class="metric-label">Cảnh báo</div>
          </div>
        </div>
        
        <div class="card" style="margin-top: 16px;">
          <div class="card-title">Thiết bị</div>
          <ul class="device-list" id="deviceList">
            <li class="empty-state">Đang tải...</li>
          </ul>
        </div>
        
        <div class="card">
          <div class="card-title">Điều khiển</div>
          <button class="btn" id="refreshBtn">Làm mới dữ liệu</button>
        </div>
      </div>
    </div>

    <div id="tab-crops" class="tab-content">
      <div class="content">
        <div class="card">
          <div class="card-title">Danh sách cây trồng</div>
          <div id="cropList">
            <div class="empty-state">Nhấn để tải dữ liệu...</div>
          </div>
        </div>
      </div>
    </div>

    <div id="tab-settings" class="tab-content">
      <div class="content">
        <div class="card">
          <div class="setting-item">
            <span class="setting-label">Máy chủ</span>
            <span class="setting-value" id="serverUrl">--</span>
          </div>
          <div class="setting-item">
            <span class="setting-label">Cập nhật</span>
            <span class="setting-value" id="lastUpdate">--</span>
          </div>
          <div class="setting-item">
            <span class="setting-label">Phiên bản</span>
            <span class="setting-value">1.0.0</span>
          </div>
        </div>
        <button class="btn" id="clearCacheBtn">Xóa cache</button>
      </div>
    </div>
    
    <nav class="nav">
      <div class="nav-item active" data-tab="dashboard">Dashboard</div>
      <div class="nav-item" data-tab="crops">Crops</div>
      <div class="nav-item" data-tab="settings">Settings</div>
    </nav>
  </div>

  <script>
    const API_BASE = (window.Capacitor && window.Capacitor.isNativePlatform) 
      ? 'http://10.0.2.2:3000' 
      : (window.location.origin || 'http://localhost:3000');
    const WS_URL = (window.location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + (window.location.hostname || 'localhost') + ':3000/ws';
    
    let ws = null;
    let reconnectTimer = null;
    let isOffline = false;
    let cropsLoaded = false;
    
    function showError(msg) {
      console.error(msg);
      document.getElementById('tempValue').innerHTML = '--<span class="card-unit">°C</span>';
      document.getElementById('humidityValue').innerHTML = '--<span class="card-unit">%</span>';
      document.getElementById('deviceList').innerHTML = '<li class="empty-state">' + msg + '</li>';
    }
    
    function initNavigation() {
      const navItems = document.querySelectorAll('.nav-item');
      navItems.forEach(item => {
        item.addEventListener('click', function() {
          const tabName = this.getAttribute('data-tab');
          document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
          this.classList.add('active');
          document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
          document.getElementById('tab-' + tabName).classList.add('active');
          loadTabData(tabName);
        });
      });
    }
    
    function loadTabData(tabName) {
      if (tabName === 'crops') {
        loadCrops();
      } else if (tabName === 'settings') {
        document.getElementById('serverUrl').textContent = API_BASE;
        document.getElementById('lastUpdate').textContent = new Date().toLocaleString('vi-VN');
      }
    }
    
    async function loadCrops() {
      try {
        const res = await fetch(API_BASE + '/api/crops', { headers: { 'Content-Type': 'application/json' } });
        if (!res.ok) throw new Error('API error');
        const crops = await res.json();
        const list = document.getElementById('cropList');
        if (crops && crops.length > 0) {
          list.innerHTML = crops.map(c => 
            '<div class="crop-card"><div class="crop-name">' + (c.name || 'Cay trong') + '</div>' +
            '<div class="crop-info">Giai doan: ' + (c.stage || '--') + ' | Ngay trong: ' + (c.plantedDate || '--') + '</div></div>'
          ).join('');
        } else {
          list.innerHTML = '<div class="empty-state">Chua co cay trong</div>';
        }
      } catch (err) {
        document.getElementById('cropList').innerHTML = '<div class="empty-state">Khong the tai du lieu</div>';
      }
    }
    
    function loadCachedData() {
      const cached = localStorage.getItem('dashboardData');
      if (cached) {
        try {
          const data = JSON.parse(cached);
          updateDashboard(data);
          console.log('Loaded cached data');
        } catch (e) {}
      }
    }
    
    function cacheData(data) {
      localStorage.setItem('dashboardData', JSON.stringify({ ...data, timestamp: Date.now() }));
    }
    
    function connect() {
      try {
        ws = new WebSocket(WS_URL);
        ws.onopen = () => {
          console.log('WS Connected');
          document.getElementById('connectionStatus').classList.remove('offline');
          isOffline = false;
        };
        ws.onclose = () => {
          console.log('WS Disconnected');
          document.getElementById('connectionStatus').classList.add('offline');
          isOffline = true;
          if (reconnectTimer) clearTimeout(reconnectTimer);
          reconnectTimer = setTimeout(connect, 5000);
        };
        ws.onerror = (err) => {
          console.error('WS Error:', err);
          isOffline = true;
          loadCachedData();
        };
        ws.onmessage = (e) => {
          try {
            const data = JSON.parse(e.data);
            if (data.type === 'sensor-data' || data.temperature !== undefined) {
              updateDashboard(data);
              cacheData(data);
            }
          } catch (err) {
            console.error('Parse error:', err);
          }
        };
      } catch (err) {
        console.error('WS Init Error:', err);
        isOffline = true;
        loadCachedData();
      }
    }
    
    function updateDashboard(data) {
      if (data.temperature !== undefined && data.temperature !== null) {
        document.getElementById('tempValue').innerHTML = data.temperature + '<span class="card-unit">°C</span>';
      }
      if (data.humidity !== undefined && data.humidity !== null) {
        document.getElementById('humidityValue').innerHTML = data.humidity + '<span class="card-unit">%</span>';
      }
      if (data.devices) {
        document.getElementById('deviceCount').textContent = data.devices.length;
        const list = document.getElementById('deviceList');
        list.innerHTML = data.devices.map(d => 
          '<li class="device-item"><span class="device-name">' + (d.name || 'Thiet bi') + '</span><span class="device-status ' + (d.status || 'offline') + '">' + (d.status || 'offline') + '</span></li>'
        ).join('') || '<li class="empty-state">Khong co thiet bi</li>';
      }
    }
    
    async function fetchData() {
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 5000);
        
        const res = await fetch(API_BASE + '/api/sensors/latest', { 
          signal: controller.signal,
          headers: { 'Content-Type': 'application/json' }
        });
        clearTimeout(timeout);
        
        if (!res.ok) throw new Error('API error: ' + res.status);
        
        const data = await res.json();
        updateDashboard(data);
        cacheData(data);
        document.getElementById('connectionStatus').classList.remove('offline');
      } catch (err) {
        console.error('Fetch Error:', err.message);
        document.getElementById('connectionStatus').classList.add('offline');
        loadCachedData();
        showError('Khong the ket noi may chu');
      }
    }
    
    document.getElementById('refreshBtn').addEventListener('click', function() {
      this.textContent = 'Dang tai...';
      fetchData().finally(() => {
        setTimeout(() => { this.textContent = 'Lam moi du lieu'; }, 1000);
      });
    });
    
    document.getElementById('clearCacheBtn').addEventListener('click', function() {
      localStorage.clear();
      alert('Da xoa cache');
      document.getElementById('lastUpdate').textContent = new Date().toLocaleString('vi-VN');
    });
    
    document.getElementById('cropList').addEventListener('click', loadCrops);
    
    initNavigation();
    loadCachedData();
    connect();
    fetchData();
    
    setInterval(fetchData, 30000);
  </script>
</body>
</html>
