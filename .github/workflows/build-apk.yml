name: Build Mobile APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile-app/**'
      - 'capacitor.config.json'
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile-app/package-lock.json

      - name: Install dependencies
        run: |
          cd mobile-app
          npm install
          ls -la

      - name: Sync Android
        run: |
          cd mobile-app
          npx cap sync android

      - name: Build debug APK
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == ''
        run: |
          cd mobile-app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build release APK
        if: github.event.inputs.build_type == 'release'
        run: |
          cd mobile-app/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload debug APK
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == ''
        uses: actions/upload-artifact@v4
        with:
          name: ecosyntech-debug.apk
          path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ecosyntech-release.apk
          path: mobile-app/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30